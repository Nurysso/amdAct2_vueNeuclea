global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'novamart-api-monitor'

scrape_configs:
  - job_name: 'novamart-api'
    static_configs:
      - targets: ['host.docker.internal:9091']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9091']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
